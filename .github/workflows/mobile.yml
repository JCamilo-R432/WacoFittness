name: Mobile Build (iOS + Android)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]

defaults:
  run:
    working-directory: frontend_rn

jobs:
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform != 'ios' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend_rn/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - name: Build Android (EAS)
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Submit to Play Store
        if: startsWith(github.ref, 'refs/tags/')
        run: eas submit --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    if: ${{ github.event.inputs.platform != 'android' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend_rn/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - name: Build iOS (EAS)
        run: eas build --platform ios --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Submit to TestFlight
        if: startsWith(github.ref, 'refs/tags/')
        run: eas submit --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Generate changelog
        id: log
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then CHANGES=$(git log --pretty=format:"- %s" $PREV..HEAD); else CHANGES=$(git log --pretty=format:"- %s" HEAD~10..HEAD); fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.ver.outputs.VERSION }}
          release_name: WacoPro Fitness ${{ steps.ver.outputs.VERSION }}
          body: |
            ## 🚀 WacoPro Fitness ${{ steps.ver.outputs.VERSION }}

            ### Changes
            ${{ steps.log.outputs.CHANGES }}

            ### Builds
            - 📱 iOS: TestFlight
            - 🤖 Android: Play Store Internal Track
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.VERSION, '-') }}
