name: Weekly Compliance Report (SOC2/HIPAA/GDPR)

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:
    inputs:
      framework:
        description: 'Framework to run (SOC2/HIPAA/GDPR/all)'
        default: 'all'

jobs:
  run-compliance-controls:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run SOC2 Controls
        if: github.event.inputs.framework == 'all' || github.event.inputs.framework == 'SOC2' || github.event_name == 'schedule'
        run: |
          curl -X GET "${{ secrets.API_URL }}/api/compliance/controls/SOC2" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -o compliance-soc2.json
          cat compliance-soc2.json
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Run HIPAA Controls
        if: github.event.inputs.framework == 'all' || github.event.inputs.framework == 'HIPAA' || github.event_name == 'schedule'
        run: |
          curl -X GET "${{ secrets.API_URL }}/api/compliance/controls/HIPAA" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -o compliance-hipaa.json

      - name: Run GDPR Controls
        if: github.event.inputs.framework == 'all' || github.event.inputs.framework == 'GDPR' || github.event_name == 'schedule'
        run: |
          curl -X GET "${{ secrets.API_URL }}/api/compliance/controls/GDPR" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -o compliance-gdpr.json

      - name: Upload compliance evidence
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence-${{ github.run_id }}
          path: compliance-*.json
          retention-days: 365  # Keep for 1 year (SOC2 requirement)

      - name: Check for failures
        run: |
          for file in compliance-*.json; do
            FAILED=$(cat $file | jq '.summary.failed // 0')
            if [ "$FAILED" -gt "0" ]; then
              echo "COMPLIANCE FAILURE in $file: $FAILED controls failed"
              exit 1
            fi
          done
          echo "All compliance controls passed"

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 COMPLIANCE FAILURE: One or more automated controls failed. Review artifacts: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_COMPLIANCE }}
