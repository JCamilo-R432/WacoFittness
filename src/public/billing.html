<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facturación - WacoPro Fitness</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F172A; color: #E2E8F0; min-height: 100vh; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: #1E293B; border-bottom: 1px solid #334155; }
    .nav-logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg,#3B82F6,#8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav a { color: #94A3B8; text-decoration: none; margin-left: 20px; font-size: 14px; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: #94A3B8; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #1E293B; border: 1px solid #334155; border-radius: 16px; padding: 28px; }
    .card h2 { font-size: 16px; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
    .plan-badge { display: inline-flex; align-items: center; gap: 8px; background: #1E3A5F; border: 1px solid #3B82F6; color: #60A5FA; padding: 8px 16px; border-radius: 24px; font-weight: 700; font-size: 15px; margin-bottom: 16px; }
    .plan-badge.premium { background: #2D1B69; border-color: #8B5CF6; color: #A78BFA; }
    .plan-badge.free { background: #1E293B; border-color: #475569; color: #94A3B8; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1E293B; font-size: 14px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #94A3B8; }
    .info-value { font-weight: 600; }
    .status-active { color: #10B981; }
    .status-canceled { color: #EF4444; }
    .status-trialing { color: #F59E0B; }
    .status-past_due { color: #EF4444; }
    .btn { padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: all .2s; }
    .btn-primary { background: #3B82F6; color: #fff; }
    .btn-primary:hover { background: #2563EB; }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #E2E8F0; margin-left: 12px; }
    .btn-outline:hover { border-color: #94A3B8; }
    .btn-danger { background: transparent; border: 1px solid #EF4444; color: #EF4444; }
    .btn-danger:hover { background: #EF4444; color: #fff; }
    .btn-actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
    .payment-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #334155; }
    .payment-item:last-child { border-bottom: none; }
    .payment-desc { font-size: 14px; font-weight: 600; }
    .payment-date { font-size: 12px; color: #64748B; margin-top: 2px; }
    .payment-amount { font-size: 16px; font-weight: 700; color: #10B981; }
    .payment-failed { color: #EF4444; }
    .empty-state { text-align: center; padding: 40px 20px; color: #64748B; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #334155; border-top-color: #3B82F6; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1E293B; border: 1px solid #334155; border-radius: 12px; padding: 14px 20px; font-size: 14px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all .3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
    .confirm-modal.show { display: flex; }
    .confirm-box { background: #1E293B; border: 1px solid #334155; border-radius: 16px; padding: 32px; max-width: 400px; width: 90%; text-align: center; }
    .confirm-box h3 { font-size: 20px; margin-bottom: 8px; }
    .confirm-box p { color: #94A3B8; font-size: 14px; margin-bottom: 24px; }
    .confirm-actions { display: flex; gap: 12px; justify-content: center; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">💪 WacoPro</div>
  <div>
    <a href="/dashboard">Dashboard</a>
    <a href="/pricing">Cambiar plan</a>
    <a href="/security-settings">Seguridad</a>
  </div>
</nav>

<div class="container">
  <h1>Facturación</h1>
  <p class="subtitle">Gestiona tu suscripción y métodos de pago</p>

  <div class="grid">
    <!-- Suscripción actual -->
    <div class="card">
      <h2>Suscripción Actual</h2>
      <div id="subscription-content">
        <div class="spinner"></div> Cargando...
      </div>
    </div>

    <!-- Historial de pagos -->
    <div class="card">
      <h2>Historial de Pagos</h2>
      <div id="payments-content">
        <div class="spinner"></div> Cargando...
      </div>
    </div>
  </div>
</div>

<!-- Modal de confirmación -->
<div class="confirm-modal" id="cancel-modal">
  <div class="confirm-box">
    <h3>¿Cancelar suscripción?</h3>
    <p>Mantendrás acceso hasta el final del período pagado. Puedes reactivar en cualquier momento.</p>
    <div class="confirm-actions">
      <button type="button" class="btn btn-outline" onclick="document.getElementById('cancel-modal').classList.remove('show')">
        Mantener plan
      </button>
      <button type="button" class="btn btn-danger" onclick="confirmCancel()">
        Sí, cancelar
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
const token = localStorage.getItem('token');

if (!token) { window.location.href = '/login?redirect=billing'; }

const params = new URLSearchParams(location.search);
if (params.get('success') === 'true') {
  const plan = params.get('plan') || '';
  showToast(`✅ Suscripción ${plan} activada exitosamente`);
  history.replaceState({}, '', '/billing');
}

async function loadSubscription() {
  try {
    const res = await fetch(`${API}/payments/subscription`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    const { subscription, plan } = data.data;
    const el = document.getElementById('subscription-content');

    if (!subscription || subscription.planId === 'free') {
      el.innerHTML = `
        <div class="plan-badge free">🆓 Plan Gratuito</div>
        <p style="color:#94A3B8;font-size:14px;margin-bottom:20px;">
          Actualiza para desbloquear todas las funciones.
        </p>
        <a href="/pricing" class="btn btn-primary">Ver planes</a>
      `;
      return;
    }

    const statusClass = {
      active: 'status-active', canceled: 'status-canceled',
      trialing: 'status-trialing', past_due: 'status-past_due',
    }[subscription.status] || '';

    const statusLabel = {
      active: '✅ Activo', canceled: '❌ Cancelado',
      trialing: '⏳ En prueba', past_due: '⚠️ Pago pendiente',
    }[subscription.status] || subscription.status;

    const endDate = subscription.currentPeriodEnd
      ? new Date(subscription.currentPeriodEnd).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' })
      : '—';

    el.innerHTML = `
      <div class="plan-badge ${subscription.planId}">
        ${subscription.planId === 'pro' ? '⚡' : '👑'} WacoPro ${subscription.planId.charAt(0).toUpperCase() + subscription.planId.slice(1)}
      </div>
      <div class="info-row">
        <span class="info-label">Estado</span>
        <span class="info-value ${statusClass}">${statusLabel}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Precio</span>
        <span class="info-value">$${plan.priceMonthly}/mes</span>
      </div>
      <div class="info-row">
        <span class="info-label">${subscription.cancelAtPeriodEnd ? 'Acceso hasta' : 'Próximo cobro'}</span>
        <span class="info-value">${endDate}</span>
      </div>
      ${subscription.cancelAtPeriodEnd ? '<p style="color:#F59E0B;font-size:13px;margin-top:8px;">⚠️ Cancelación programada al final del período</p>' : ''}
      <div class="btn-actions">
        <button type="button" class="btn btn-primary" onclick="openBillingPortal()">
          Gestionar con Stripe
        </button>
        ${!subscription.cancelAtPeriodEnd
          ? `<button type="button" class="btn btn-danger" onclick="document.getElementById('cancel-modal').classList.add('show')">
              Cancelar plan
             </button>`
          : `<a href="/pricing" class="btn btn-primary">Reactivar</a>`
        }
      </div>
    `;
  } catch (err) {
    document.getElementById('subscription-content').innerHTML =
      `<p style="color:#EF4444;">Error: ${err.message}</p>`;
  }
}

async function loadPayments() {
  try {
    const res = await fetch(`${API}/payments/history`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    const el = document.getElementById('payments-content');
    if (!data.data.payments.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">💳</div><p>Sin pagos registrados</p></div>`;
      return;
    }

    el.innerHTML = data.data.payments.map(p => `
      <div class="payment-item">
        <div>
          <div class="payment-desc">${p.description || 'Suscripción WacoPro'}</div>
          <div class="payment-date">${new Date(p.createdAt).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
        </div>
        <div class="payment-amount ${p.status === 'failed' ? 'payment-failed' : ''}">
          ${p.status === 'failed' ? '❌ ' : ''}
          $${(p.amount / 100).toFixed(2)}
          ${p.receiptUrl ? `<br><a href="${p.receiptUrl}" target="_blank" style="font-size:11px;color:#3B82F6;">Ver recibo</a>` : ''}
        </div>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('payments-content').innerHTML =
      `<p style="color:#EF4444;">Error: ${err.message}</p>`;
  }
}

async function openBillingPortal() {
  try {
    const res = await fetch(`${API}/payments/portal`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    window.location.href = data.data.url;
  } catch (err) {
    showToast(`Error: ${err.message}`, true);
  }
}

async function confirmCancel() {
  document.getElementById('cancel-modal').classList.remove('show');
  try {
    const res = await fetch(`${API}/payments/subscription`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    showToast('✅ Suscripción cancelada. Mantienes acceso hasta fin del período.');
    loadSubscription();
  } catch (err) {
    showToast(`Error: ${err.message}`, true);
  }
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show${isError ? ' error' : ''}`;
  setTimeout(() => t.className = 'toast', 5000);
}

loadSubscription();
loadPayments();
</script>
</body>
</html>
