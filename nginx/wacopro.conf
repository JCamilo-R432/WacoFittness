# ── Nginx — WacoPro Fitness ───────────────────────────────────────────────
# Ubicación en el VPS: /etc/nginx/sites-available/wacopro
# Habilitar:  sudo ln -s /etc/nginx/sites-available/wacopro /etc/nginx/sites-enabled/
# Testear:    sudo nginx -t
# Recargar:   sudo systemctl reload nginx
#
# Antes de activar HTTPS, reemplazá "tudominio.com" con tu dominio real
# y ejecutá: sudo certbot --nginx -d tudominio.com

# ── Rate limiting (definir en context http, fuera de server{}) ────────────
# NOTA: Este bloque debe vivir en /etc/nginx/nginx.conf dentro del bloque http{}.
# Si usás este archivo como sites-available, Nginx lo incluye dentro de http{} automáticamente.
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=2r/s;

# ── Redirigir HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com www.tudominio.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Servidor principal ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tudominio.com www.tudominio.com;

    # SSL — certificados generados por certbot
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/wacopro.access.log;
    error_log  /var/log/nginx/wacopro.error.log;

    # Tamaño máximo de body (uploads de fotos de perfil, etc.)
    client_max_body_size 10M;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=()" always;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml+rss
        image/svg+xml;

    # ── Health check (sin rate limit, acceso libre para monitoreo) ────────
    location = /api/health {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Endpoints de autenticación (rate limit estricto) ─────────────────
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API general (rate limit moderado) ────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (OpenAI puede tardar hasta 30s)
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # ── WebSocket — Socket.io (sin timeout de lectura) ────────────────────
    location /socket.io/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── Assets estáticos con caché ────────────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # ── Frontend (HTML — sin caché para recibir cambios inmediatos) ───────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
