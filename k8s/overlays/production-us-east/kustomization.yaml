apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wacopro-production

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: wacopro-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/nodeSelector
        value:
          topology.kubernetes.io/region: us-east-1
          node.kubernetes.io/instance-type: t3.large
  - target:
      kind: HorizontalPodAutoscaler
      name: wacopro-backend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 5
      - op: replace
        path: /spec/maxReplicas
        value: 100

configMapGenerator:
  - name: wacopro-config
    behavior: merge
    literals:
      - REGION=us-east-1
      - API_URL=https://us-east.wacopro.com
      - CDN_ENDPOINT=https://us-east.cdn.wacopro.com

images:
  - name: ghcr.io/wacopro/backend
    newTag: "latest"
