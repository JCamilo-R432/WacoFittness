apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wacopro-us-east
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: wacopro
  source:
    repoURL: https://github.com/wacopro/wacopro-fitness
    targetRevision: main
    path: k8s/overlays/production-us-east
  destination:
    server: https://kubernetes.default.svc
    namespace: wacopro-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wacopro-eu-central
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: wacopro
  source:
    repoURL: https://github.com/wacopro/wacopro-fitness
    targetRevision: main
    path: k8s/overlays/production-eu-central
  destination:
    server: https://k8s-eu-central.wacopro.internal
    namespace: wacopro-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 5
