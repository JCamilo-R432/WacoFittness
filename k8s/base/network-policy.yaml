apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wacopro-backend-netpol
  namespace: wacopro-production
spec:
  podSelector:
    matchLabels:
      app: wacopro-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: istio-ingressgateway
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 443   # External HTTPS (Stripe, OpenAI, etc.)
        - protocol: TCP
          port: 53    # DNS
      protocol: UDP
