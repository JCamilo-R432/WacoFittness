apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wacopro-backend
  namespace: wacopro-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wacopro-backend
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 min stabilization
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
